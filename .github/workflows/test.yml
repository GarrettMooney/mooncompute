name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync
      - name: ruff format
        run: uv run ruff format --check .
      - name: ruff lint
        run: uv run ruff check .
      - name: ty
        run: uv run ty check

  get-python-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      python-versions: ${{ steps.get-versions.outputs.python-versions }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Get Python versions from pyproject.toml
        id: get-versions
        run: |
          set -euo pipefail
          MIN_VERSION=$(uvx --from=toml-cli toml get --toml-path=pyproject.toml project.requires-python | sed 's/>=//;s/"//g')

          LIST=$(uv python list --all-versions --output-format json)

          CPYTHON_VERSIONS=$(echo "$LIST" | jq -c --arg min "$MIN_VERSION" '
            ($min | split(".") | {major: .[0]|tonumber, minor: .[1]|tonumber}) as $minv |
            [.[]
              | select(.implementation == "cpython")
              | select(.version | test("[a-zA-Z]") | not)  # drop pre-releases (e.g. 3.15.0b2): no native-dep wheels yet
              | {v:.version_parts, t:.variant, impl:.implementation}]
            | unique_by([.v.minor,.t])
            | map(select(
                (.impl == "cpython") and
                (.v.major == 3) and
                (.v.minor >= $minv.minor)
              ))
            | map(select(.t != "freethreaded"))
            | map("\(.v.major).\(.v.minor)\(if .t=="freethreaded" then "t" else "" end)")')

          versions=$(jq -nc --argjson a "$CPYTHON_VERSIONS" '$a')

          echo "python-versions=$versions" >> $GITHUB_OUTPUT

  test:
    needs: get-python-versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.get-python-versions.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -q
