name: CI

# Build and publish to PyPI via Trusted Publishing (OIDC) -- no API token. PyPI
# verifies the upload came from this repo's workflow, so what users install is
# provably the artifact CI built (see docs/RELEASING.md for the one-time
# pending-publisher registration). Releases run on a `v*` tag push, or via the
# `workflow_run` hook after "Deploy Release" (a tag pushed by that job's
# GITHUB_TOKEN does not itself trigger this workflow).

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Release"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-commit:
    runs-on: ubuntu-latest
    if: >
      (
        (
          (github.event_name == 'push')
          || (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'GarrettMooney')
        )
        && startsWith(github.event.head_commit.message, 'chore(release)')
      )
      || (github.event_name == 'workflow_dispatch')
      || (github.event_name == 'workflow_run')
    steps:
      - name: Confirm commit message matched
        run: echo "Release condition matched."

  build:
    needs: [check-commit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build package
        run: uv build
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    environment: pypi
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run' }}
    needs: [build]
    permissions:
      id-token: write # OIDC token for Trusted Publishing
      contents: read
      attestations: write # build-provenance attestation
    steps:
      - uses: actions/download-artifact@v4

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "wheels-*/*"

      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_run' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels-sdist/
