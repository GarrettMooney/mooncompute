[project]
name = "dswkit"
version = "0.1.0"
description = "Shared GCP data-access helpers for Designer Brands marketing data science."
requires-python = ">=3.11"
dependencies = [
    "polars>=1.0",
    "pyarrow>=15",
    "google-cloud-bigquery>=3.0",
    "google-cloud-storage>=2.0",
    "db-dtypes>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dswkit"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ty.environment]
python-version = "3.11"

[tool.ty.src]
include = ["src", "tests"]

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.15.14",
    "ty>=0.0.39",
]
