[project]
name = "dswkit"
version = "0.1.0"
description = "Shared GCP data-access helpers for Designer Brands marketing data science."
requires-python = ">=3.11"
dependencies = [
    "polars>=1.0",
    "pyarrow>=15",
    "google-cloud-bigquery>=3.0",
    "google-cloud-storage>=2.0",
    "db-dtypes>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dswkit"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = ["pytest>=8"]
